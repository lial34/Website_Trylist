<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL - 대시보드</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <a class="logo" href="index.html">TafUL</a>
      <nav class="menu">
        <ul>
          <li class="material-symbols-outlined circle-icon active" data-tooltip="대시보드">
            <a href="dashboard.html">dashboard</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="서버관리">
            <a href="servers.html">storage</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인정보">
            <a href="account.html">account_circle</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인설정">
            <a href="settings.html">settings</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <div class="section-bar">
        <div>
          <h1 class="page-title">내 가상 데스크톱</h1>
          <p class="page-desc">생성한 가상 데스크톱을 한눈에 보고 관리하세요.</p>
        </div>
        <button class="btn-create" type="button" onclick="openCreate()">
          <span class="material-symbols-outlined">add</span>
          새 가상 데스크톱 생성
        </button>
      </div>

      <div class="card-grid">
        <div class="card">
          <div class="card-head">
            <h3 class="card-name">내 작업용 PC</h3>
            <span class="badge on">실행 중</span>
          </div>
          <p class="card-spec"><span class="material-symbols-outlined">desktop_windows</span>Windows 11</p>
          <p class="card-spec"><span class="material-symbols-outlined">memory</span>4 vCPU · 8GB RAM</p>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">접속</button>
            <button class="btn btn-danger"><span class="material-symbols-outlined">delete</span></button>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3 class="card-name">개발 서버</h3>
            <span class="badge off">정지됨</span>
          </div>
          <p class="card-spec"><span class="material-symbols-outlined">desktop_windows</span>Ubuntu 22.04</p>
          <p class="card-spec"><span class="material-symbols-outlined">memory</span>8 vCPU · 16GB RAM</p>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">접속</button>
            <button class="btn btn-danger"><span class="material-symbols-outlined">delete</span></button>
          </div>
        </div>
      </div>
    </main>

    <!-- 생성 모달 -->
    <div class="modal-bg" id="createModal">
      <div class="modal">
        <h2>새 가상 데스크톱</h2>
        <div class="field">
          <label for="vmName">이름</label>
          <input type="text" id="vmName" placeholder="예) 내 작업용 PC" />
        </div>
        <div class="field">
          <label for="vmOs">운영체제</label>
          <select id="vmOs">
            <option>Windows 11</option>
            <option>Windows 10</option>
            <option>Ubuntu 22.04</option>
            <option>macOS Sonoma</option>
          </select>
        </div>
        <div class="field">
          <label for="vmSpec">사양</label>
          <select id="vmSpec">
            <option>베이직 (2 vCPU · 4GB RAM)</option>
            <option>스탠다드 (4 vCPU · 8GB RAM)</option>
            <option>프로 (8 vCPU · 16GB RAM)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-light" type="button" onclick="closeCreate()">취소</button>
          <button class="btn btn-primary" type="button" onclick="closeCreate()">생성하기</button>
        </div>
      </div>
    </div>

    <script src="js/dashboard.js"></script>
  </body>
</html>
