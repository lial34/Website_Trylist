<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL - 개인정보</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <a class="logo" href="index.html">TafUL</a>
      <nav class="menu">
        <ul>
          <li class="material-symbols-outlined circle-icon" data-tooltip="대시보드">
            <a href="dashboard.html">dashboard</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="서버관리">
            <a href="servers.html">storage</a>
          </li>
          <li class="material-symbols-outlined circle-icon active" data-tooltip="개인정보">
            <a href="account.html">account_circle</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인설정">
            <a href="settings.html">settings</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <h1 class="page-title">개인정보</h1>
      <p class="page-desc">내 계정 정보를 확인하고 수정할 수 있습니다.</p>

      <div class="profile">
        <div class="avatar"><span class="material-symbols-outlined">person</span></div>
        <div class="profile-info">
          <h2>홍길동</h2>
          <p>user@taful.com</p>
          <span class="plan-tag">스탠다드 플랜</span>
        </div>
      </div>

      <div class="panel">
        <h2>정보 수정</h2>
        <div class="field">
          <label for="name">이름</label>
          <input type="text" id="name" value="홍길동" />
        </div>
        <div class="field">
          <label for="email">이메일</label>
          <input type="email" id="email" value="user@taful.com" />
        </div>
        <div class="field">
          <label for="plan">요금제</label>
          <select id="plan">
            <option>베이직 플랜</option>
            <option selected>스탠다드 플랜</option>
            <option>프로 플랜</option>
          </select>
        </div>
        <div class="field">
          <label for="password">새 비밀번호 (변경 시에만 입력)</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" type="button">저장하기</button>
      </div>
    </main>
  </body>
</html>
