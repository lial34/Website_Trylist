<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL - 개인설정</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <a class="logo" href="index.html">TafUL</a>
      <nav class="menu">
        <ul>
          <li class="material-symbols-outlined circle-icon" data-tooltip="대시보드">
            <a href="dashboard.html">dashboard</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="서버관리">
            <a href="servers.html">storage</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인정보">
            <a href="account.html">account_circle</a>
          </li>
          <li class="material-symbols-outlined circle-icon active" data-tooltip="개인설정">
            <a href="settings.html">settings</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <h1 class="page-title">개인설정</h1>
      <p class="page-desc">서비스 사용 환경을 원하는 대로 설정하세요.</p>

      <div style="max-width: 640px">
        <div class="row">
          <div class="row-text">
            <h3>이메일 알림</h3>
            <p>서버 상태 변화를 이메일로 받아봅니다.</p>
          </div>
          <label class="switch">
            <input type="checkbox" checked />
            <span class="slider"></span>
          </label>
        </div>

        <div class="row">
          <div class="row-text">
            <h3>자동 시작</h3>
            <p>로그인 시 마지막으로 사용한 서버를 자동으로 켭니다.</p>
          </div>
          <label class="switch">
            <input type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="row">
          <div class="row-text">
            <h3>절전 모드</h3>
            <p>일정 시간 미사용 시 서버를 자동으로 정지합니다.</p>
          </div>
          <label class="switch">
            <input type="checkbox" checked />
            <span class="slider"></span>
          </label>
        </div>

        <div class="row">
          <div class="row-text">
            <h3>언어</h3>
            <p>서비스 표시 언어를 선택합니다.</p>
          </div>
          <select style="width: 160px; padding: 9px 12px; border: 1px solid #d6e2ef; border-radius: 8px">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </div>
    </main>
  </body>
</html>
