<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL - 서버관리</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <a class="logo" href="index.html">TafUL</a>
      <nav class="menu">
        <ul>
          <li class="material-symbols-outlined circle-icon" data-tooltip="대시보드">
            <a href="dashboard.html">dashboard</a>
          </li>
          <li class="material-symbols-outlined circle-icon active" data-tooltip="서버관리">
            <a href="servers.html">storage</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인정보">
            <a href="account.html">account_circle</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인설정">
            <a href="settings.html">settings</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="page">
      <h1 class="page-title">서버관리</h1>
      <p class="page-desc">실행 중인 서버의 상태와 자원 사용량을 확인하세요.</p>

      <div class="card-grid">
        <div class="card">
          <div class="card-head">
            <h3 class="card-name">web-server-01</h3>
            <span class="badge on">실행 중</span>
          </div>
          <p class="card-spec"><span class="material-symbols-outlined">lan</span>192.168.0.11</p>
          <div class="usage">
            <div class="usage-label"><span>CPU</span><span>38%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 38%"></div></div>
          </div>
          <div class="usage">
            <div class="usage-label"><span>메모리</span><span>54%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 54%"></div></div>
          </div>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">
              <span class="material-symbols-outlined">stop</span>정지
            </button>
            <button class="btn btn-light"><span class="material-symbols-outlined">restart_alt</span></button>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3 class="card-name">db-server-01</h3>
            <span class="badge on">실행 중</span>
          </div>
          <p class="card-spec"><span class="material-symbols-outlined">lan</span>192.168.0.12</p>
          <div class="usage">
            <div class="usage-label"><span>CPU</span><span>71%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 71%"></div></div>
          </div>
          <div class="usage">
            <div class="usage-label"><span>메모리</span><span>66%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 66%"></div></div>
          </div>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">
              <span class="material-symbols-outlined">stop</span>정지
            </button>
            <button class="btn btn-light"><span class="material-symbols-outlined">restart_alt</span></button>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3 class="card-name">test-server</h3>
            <span class="badge off">정지됨</span>
          </div>
          <p class="card-spec"><span class="material-symbols-outlined">lan</span>192.168.0.20</p>
          <div class="usage">
            <div class="usage-label"><span>CPU</span><span>0%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 0%"></div></div>
          </div>
          <div class="usage">
            <div class="usage-label"><span>메모리</span><span>0%</span></div>
            <div class="usage-track"><div class="usage-fill" style="width: 0%"></div></div>
          </div>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">
              <span class="material-symbols-outlined">play_arrow</span>시작
            </button>
            <button class="btn btn-light"><span class="material-symbols-outlined">restart_alt</span></button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
