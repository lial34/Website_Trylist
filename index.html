<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      section {
        margin: 0;
        min-height: 100%;
        font-family: "Google Sans";
      }

      .hero {
        min-height: 100vh;
        padding: 180px clamp(24px, 10vw, 180px);
        background: linear-gradient(270deg, #ffffff, #81ccff, #ffffff);
        background-size: 600% 600%;
        animation: heroGradient 30s ease infinite;
        box-shadow: 0px 8px 6px -6px #666;
      }

      .hero-title {
        margin: 0;
        color: #111;
        font-size: clamp(48px, 8vw, 90px);
        font-weight: 700;
        line-height: 1.1;
      }

      .hero-subtitle {
        margin: 8px 0 0;
        color: #111;
        font-size: clamp(36px, 6vw, 70px);
        font-weight: 300;
        line-height: 1.15;
      }

      .hero-description {
        margin: 28px 0 0;
        max-width: 720px;
        color: #222;
        font-size: 20px;
        line-height: 1.7;
      }

      header {
        background-color: transparent !important;
        color: black;
        padding-left: 32px;
        padding-right: 20px;
        margin: 0px;
        height: 0px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
      }

      ul {
        list-style-type: none;
        padding-top: 70px;
      }

      h1 {
        list-style-type: none;
        padding-top: 70px;
      }

      li {
        display: inline-block;
        margin-left: 25px;
        font-size: clamp(10px, 1vw, 16px);
        font-weight: 700;
        font-family: sans-serif;
      }

      a {
        text-decoration: none;
        color: black;
      }

      .li:after {
        background: none repeat scroll 0 0 transparent;
        bottom: 0;
        content: "";
        display: block;
        height: 2px;
        left: 50%;
        position: absolute;
        background: #ffb000;
        transition:
          width 0.3s ease 0s,
          left 0.3s ease 0s;
        width: 0;
      }
      .li:after {
        width: 100%;
        left: 0;
      }

      .logo {
        padding-top: 70px;
        color: rgb(7, 0, 102);
        font-size: clamp(16px, 3vw, 27px);
        font-weight: 800;
      }

      .custom-button {
        position: relative;
        display: inline-block;
        width: 180px;
        height: 44px;
        margin-top: 36px;
        padding: 0;
        border: 0;
        border-radius: 5px;
        color: #fff;
        background: radial-gradient(
          circle,
          rgb(159, 209, 255) 0%,
          rgb(110, 168, 255) 100%
        );
        box-shadow:
          inset 2px 2px 2px 0 rgba(255, 255, 255, 0.5),
          7px 7px 20px 0 rgba(0, 0, 0, 0.1),
          4px 4px 5px 0 rgba(0, 0, 0, 0.1);
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        line-height: 44px;
        cursor: pointer;
        transition:
          color 0.3s ease,
          background 0.3s ease,
          box-shadow 0.3s ease;
      }

      .custom-button span {
        position: relative;
        display: block;
        width: 100%;
        height: 100%;
      }

      .custom-button::before,
      .custom-button::after,
      .custom-button span::before,
      .custom-button span::after {
        position: absolute;
        content: "";
        box-shadow:
          -1px -1px 20px 0 rgba(255, 255, 255, 1),
          -4px -4px 5px 0 rgba(255, 255, 255, 1),
          7px 7px 20px 0 rgba(0, 0, 0, 0.4),
          4px 4px 5px 0 rgba(0, 0, 0, 0.3);
        transition: all 500ms ease;
      }

      .custom-button::before {
        top: 0;
        right: 0;
        width: 1px;
        height: 0;
      }

      .custom-button::after {
        bottom: 0;
        left: 0;
        width: 1px;
        height: 0;
      }

      .custom-button span::before {
        top: 0;
        left: 0;
        width: 0;
        height: 1px;
      }

      .custom-button span::after {
        right: 0;
        bottom: 0;
        width: 0;
        height: 1px;
      }

      .custom-button:hover {
        color: #000;
        background: transparent;
        box-shadow: none;
      }

      .custom-button:hover::before,
      .custom-button:hover::after {
        height: 100%;
      }

      .custom-button:hover span::before,
      .custom-button:hover span::after {
        width: 100%;
      }

      @media (max-width: 1000px) {
        .header {
          width: 100%;
          border-right: 0;
        }
      }

      @keyframes heroGradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <header>
    <h1 class="logo">Adult Cloud</h1>
    <nav class="menu">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li>Server Management</li>
        <li>User</li>
        <li>Setting</li>
      </ul>
    </nav>
  </header>
  <body>
    <main class="hero">
      <h1 class="hero-title">가장 간편한</h1>
      <p class="hero-subtitle">가상 데스크톱 서비스</p>
      <p class="hero-description">
        사용자가 필요로 하는 서버를 가장 간편하게 구축할 수 있습니다.<br />
        웹 페이지 환경에서 가상 서버를 생성하고 이를 활용하세요.
      </p>
      <button
        class="custom-button"
        type="button"
        onclick="location.href = 'dashboard.html'"
      >
        <span>가상 데스크톱 생성</span>
      </button>
    </main>
    <section>이게뭐람</section>
  </body>
</html>
