<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TafUL</title>

    <!-- 아이콘 -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
	
    <style>
      .hero {
        min-height: calc(100vh - 90px);
        padding: 50px clamp(24px, 10vw, 180px);
      }

      .hero-title {
        margin: 0;
        color: #111;
        font-size: clamp(48px, 8vw, 90px);
        font-weight: 700;
        line-height: 1.1;
      }

      .hero-subtitle {
        margin: 8px 0 0;
        color: #111;
        font-size: clamp(36px, 6vw, 70px);
        font-weight: 300;
        line-height: 1.15;
      }

      .hero-description {
        margin: 28px 0 0;
        max-width: 720px;
        color: #222;
        font-size: 20px;
        line-height: 1.7;
      }

      .custom-button {
        position: relative;
        display: inline-block;
        width: 200px;
        height: 48px;
        margin-top: 36px;
        border: 0;
        border-radius: 6px;
        color: #070066;
        background: radial-gradient(circle, #f7f7f7 0%, #ffffff 100%);
        box-shadow:
          7px 7px 20px 0 rgba(0, 0, 0, 0.1),
          4px 4px 5px 0 rgba(0, 0, 0, 0.1);
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .custom-button:hover {
        color: #fff;
        background: #47b5ff;
        box-shadow: 0 12px 28px -8px rgba(71, 181, 255, 0.7);
      }
    </style>
  </head>

  <body>
    <header>
      <a class="logo" href="index.html">TafUL</a>
      <nav class="menu">
        <ul>
          <li class="material-symbols-outlined circle-icon" data-tooltip="대시보드">
            <a href="dashboard.html">dashboard</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="서버관리">
            <a href="servers.html">storage</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인정보">
            <a href="account.html">account_circle</a>
          </li>
          <li class="material-symbols-outlined circle-icon" data-tooltip="개인설정">
            <a href="settings.html">settings</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="hero">
      <h1 class="hero-title">가장 간편한</h1>
      <p class="hero-subtitle">가상 데스크톱 서비스</p>
      <p class="hero-description">
        사용자가 필요로 하는 서버를 가장 간편하게 구축할 수 있습니다.<br />
        웹 페이지 환경에서 가상 서버를 생성하고 이를 활용하세요.
      </p>
      <button
        class="custom-button"
        type="button"
        onclick="location.href = 'dashboard.html'"
      >
        가상 데스크톱 생성
      </button>
    </main>
  </body>
</html>
